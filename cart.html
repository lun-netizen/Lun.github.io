<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keranjang Belanja</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Keranjang Belanja</h1>
    <a href="index.html">↩ Beranda</a>
    <a href="checkout.html" class="btn checkout.html">🧾 Checkout</a>
</header>

<div class="container" id="cartContainer"></div>

<h2 id="total"></h2>

<script>
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    let container = document.getElementById("cartContainer");
    let totalEl = document.getElementById("total");

    function renderCart() {
        container.innerHTML = "";
        let total = 0;

        if (cart.length === 0) {
            container.innerHTML = "<p>Keranjang masih kosong</p>";
            totalEl.innerText = "";
            return;
        }

        cart.forEach((item, index) => {
            total += item.harga;

            container.innerHTML += `
                <div class="product">
                    <h3>${item.nama}</h3>
                    <p class="price">Rp${item.harga}</p>
                    <button onclick="hapusItem(${index})">Hapus</button>
                </div>
            `;
        });

        totalEl.innerText = "Total: Rp" + total;
    }

    function hapusItem(index) {
        cart.splice(index, 1); // hapus 1 item berdasarkan index
        localStorage.setItem("cart", JSON.stringify(cart));
        renderCart(); // refresh tampilan
    }

    renderCart();
</script>

</body>
</html>
