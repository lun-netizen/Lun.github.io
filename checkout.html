<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
    <h2>Checkout</h2>
    <a href="index.html">↩ Beranda</a>
    <a href="cart.html" class="btn">🛒 Lihat Keranjang</a>
</header>

<div class="checkout-layout">
    <div class="box">
        <h3>Ringkasan Pesanan</h3>
        <div id="orderList"></div>
        <hr>
        <h3 id="total"></h3>
    </div>

    <div class="box">
        <h3>Data Pembeli</h3>

        <input type="text" id="nama" placeholder="Nama Lengkap">
        <textarea id="kelas" placeholder="Kelas"></textarea>

        <button onclick="bayar()">Buat Pesanan</button>
    </div>

</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

let orderList = document.getElementById("orderList");
let totalEl = document.getElementById("total");

function render() {
    orderList.innerHTML = "";
    let total = 0;

    if (cart.length === 0) {
        orderList.innerHTML = "<p>Keranjang kosong</p>";
        totalEl.innerText = "";
        return;
    }

    cart.forEach(item => {
        total += item.harga;

        orderList.innerHTML += `
            <div class="item">
                <p>${item.nama}</p>
                <b>Rp${item.harga}</b>
            </div>
        `;
    });

    totalEl.innerText = "Total Bayar: Rp" + total;
}

function bayar() {
    let nama = document.getElementById("nama").value;
    let kelas = document.getElementById("kelas").value;

    if (cart.length === 0) {
        alert("Keranjang kosong!");
        return;
    }

    if (!nama || !kelas) {
        alert("Isi data dulu!");
        return;
    }

    let text = "Pesanan:%0A";
    text += "Nama: " + nama + "%0A";
    text += "Kelas: " + kelas + "%0A%0A";

    cart.forEach(item => {
        text += item.nama + " - Rp" + item.harga + "%0A";
    });

    let nomor = "6281318808658";
    let url = "https://wa.me/" + nomor + "?text=" + text;

    window.open(url);

    alert("Pesanan berhasil dibuat!");

    localStorage.removeItem("cart");
    window.location.href = "index.html";
}

render();
</script>

</body>
</html>
